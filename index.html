<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Broiler Quotation System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
header { background:#111827; color:white; padding:20px; display:flex; align-items:center; gap:20px; }
header img { width:140px; background:white; padding:6px; border-radius:8px; }
main { max-width:1200px; margin:auto; padding:20px; }
.card { background:white; padding:20px; border-radius:12px; margin-bottom:20px; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
input, select { padding:8px; width:100%; }
button { padding:10px; margin-top:10px; cursor:pointer; }
.item { border:1px solid #ddd; padding:10px; margin-top:10px; border-radius:8px; }
</style>
</head>

<body>

<header>
<img src="./utc-logo.png" onerror="this.src='utc-logo.png'">
<div>
<h1>Broiler Quotation System</h1>
<p>UTC Internal System</p>
</div>
</header>

<main>

<div class="card">
<h2>Project Data</h2>
<div class="grid">
<input id="length" placeholder="Length" value="126">
<input id="width" placeholder="Width" value="14">
<input id="height" placeholder="Side Height" value="3">
<input id="ridge" placeholder="Ridge Height" value="1">
<input id="birds" placeholder="Birds" value="40000">
<input id="houses" placeholder="Houses" value="2">
<input id="airSpeed" placeholder="Air Speed" value="3">
<input id="fanCapacity" placeholder="Fan Capacity" value="44000">
</div>
</div>

<div class="card">
<h2>Cooling Pads</h2>
<div class="grid">
<select id="padType" onchange="applyPad()">
<option value="150-1.5-0.6-1.75">150mm - 1.5x0.6 - 1.75</option>
<option value="150-1.8-0.6-1.75">150mm - 1.8x0.6 - 1.75</option>
<option value="100-1.5-0.6-1.5">100mm - 1.5x0.6 - 1.5</option>
<option value="custom">Custom</option>
</select>

<input id="padThickness" placeholder="Thickness (m)" value="0.15">
<input id="padHeight" placeholder="Height (m)" value="1.5">
<input id="padWidth" placeholder="Width (m)" value="0.6">
<input id="padVelocity" placeholder="Velocity" value="1.75">
</div>
</div>

<div class="card">
<button onclick="calculate()">Calculate</button>
<div id="results"></div>
</div>

<div class="card">
<button onclick="addItems()">Add Items</button>
<div id="items"></div>
</div>

</main>

<script>

let calc = {}
let items = []

function g(id){ return Number(document.getElementById(id).value)||0 }

function applyPad(){
let v = padType.value
if(v==="custom") return
let p=v.split("-")
padThickness.value=p[0]/1000
padHeight.value=p[1]
padWidth.value=p[2]
padVelocity.value=p[3]
}

function calculate(){

let L=g("length"), W=g("width"), H=g("height"), R=g("ridge")
let houses=g("houses"), birds=g("birds")

let cross = (W*H) + (W*R/2)
let airflow = cross * g("airSpeed") * 3600
let fans = Math.ceil(airflow / g("fanCapacity"))

let feeding = Math.ceil(birds/1000)
let drinking = Math.ceil(birds/2000)

let padArea = airflow/3600 / g("padVelocity")
let padUnit = g("padHeight") * g("padWidth")
let pads = Math.ceil(padArea / padUnit)

let heaters = Math.ceil(L/30)
let acf = heaters

calc = {houses,feeding,drinking,fans,pads,heaters,acf}

results.innerHTML = `
Cross Section: ${cross.toFixed(2)} m²<br>
Fans: ${fans}<br>
Pads: ${pads}<br>
Heaters: ${heaters}<br>
ACF Fans: ${acf}
`
}

function addItems(){

items = [
{name:"Feeding",qty:calc.feeding*calc.houses},
{name:"Drinking",qty:calc.drinking*calc.houses},
{name:"Fans",qty:calc.fans*calc.houses},
{name:"Cooling Pads",qty:calc.pads*calc.houses},
{name:"Heaters",qty:calc.heaters*calc.houses},
{name:"ACF Fans",qty:calc.acf*calc.houses}
]

render()
}

function render(){
itemsDiv.innerHTML=""
items.forEach(i=>{
itemsDiv.innerHTML+=`
<div class="item">
<b>${i.name}</b><br>
Qty: ${i.qty}
</div>`
})
}

</script>

</body>
</html>
