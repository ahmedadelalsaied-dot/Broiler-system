<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Broiler Quotation System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
header { background:#111827; color:white; padding:20px; display:flex; align-items:center; gap:20px; }
header img { width:140px; background:white; padding:6px; border-radius:8px; }
main { max-width:1200px; margin:auto; padding:20px; }
.card { background:white; padding:20px; border-radius:12px; margin-bottom:20px; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
input, select { padding:8px; width:100%; }
button { padding:10px; margin-top:10px; cursor:pointer; }
.item { border:1px solid #ddd; padding:10px; margin-top:10px; border-radius:8px; }
@media(max-width:800px){ .grid { grid-template-columns:1fr; } }
</style>
</head>

<body>

<header>
<img src="utc-logo.png" onerror="this.onerror=null;this.src='./utc-logo.png';">
<div>
<h1>Broiler Quotation System</h1>
<p>UTC Internal System</p>
</div>
</header>

<main>

<div class="card">
<h2>Project Data</h2>
<div class="grid">
<input id="length" placeholder="Length (m)" value="126">
<input id="width" placeholder="Width (m)" value="14">
<input id="height" placeholder="Side Height (m)" value="3">
<input id="ridge" placeholder="Ridge Height (m)" value="1">
<input id="birds" placeholder="Birds per House" value="40000">
<input id="houses" placeholder="Number of Houses" value="2">
<input id="airSpeed" placeholder="Air Speed (m/s)" value="3">
<input id="fanCapacity" placeholder="Fan Capacity (m³/h)" value="44000">
</div>
</div>

<div class="card">
<h2>Cooling Pad Options</h2>
<div class="grid">

<select id="padType" onchange="applyPad()">
<option value="150-1.5-0.6-1.75">150mm - 1.5×0.6 - 1.75 m/s</option>
<option value="150-1.8-0.6-1.75">150mm - 1.8×0.6 - 1.75 m/s</option>
<option value="150-1.5-0.3-1.75">150mm - 1.5×0.3 - 1.75 m/s</option>
<option value="100-1.5-0.6-1.5">100mm - 1.5×0.6 - 1.5 m/s</option>
<option value="custom">Custom</option>
</select>

<input id="padThickness" value="0.15" placeholder="Thickness (m)">
<input id="padHeight" value="1.5" placeholder="Height (m)">
<input id="padWidth" value="0.6" placeholder="Width (m)">
<input id="padVelocity" value="1.75" placeholder="Velocity (m/s)">

</div>
</div>

<div class="card">
<button onclick="calculate()">Calculate</button>
<div id="results"></div>
</div>

<div class="card">
<button onclick="addItems()">Add Items</button>
<div id="items"></div>
</div>

</main>

<script>

let calc = {}
let items = []

function g(id){ return Number(document.getElementById(id).value)||0 }

function applyPad(){
let v = document.getElementById("padType").value
if(v==="custom") return
let p=v.split("-")
document.getElementById("padThickness").value=p[0]/1000
document.getElementById("padHeight").value=p[1]
document.getElementById("padWidth").value=p[2]
document.getElementById("padVelocity").value=p[3]
}

function calculate(){

let L=g("length"), W=g("width"), H=g("height"), R=g("ridge")
let houses=g("houses"), birds=g("birds")

let cross = (W*H) + (W*R/2)
let airflow = cross * g("airSpeed") * 3600
let fans = Math.ceil(airflow / g("fanCapacity"))

let feeding = Math.ceil(birds/1000)
let drinking = Math.ceil(birds/2000)

let padArea = airflow/3600 / g("padVelocity")
let padUnit = g("padHeight") * g("padWidth")
let pads = Math.ceil(padArea / padUnit)

let heaters = Math.ceil(L/30)
let acf = heaters

calc = {houses,feeding,drinking,fans,pads,heaters,acf,cross,airflow}

document.getElementById("results").innerHTML = `
Cross Section: ${cross.toFixed(2)} m²<br>
Airflow: ${Math.round(airflow)} m³/h<br>
Fans: ${fans}<br>
Pads: ${pads}<br>
Heaters: ${heaters}<br>
ACF Fans: ${acf}
`
}

function addItems(){

items = [
{name:"Feeding System",qty:calc.feeding*calc.houses},
{name:"Drinking System",qty:calc.drinking*calc.houses},
{name:"Ventilation Fans",qty:calc.fans*calc.houses},
{name:"Cooling Pads",qty:calc.pads*calc.houses},
{name:"Heating System",qty:calc.heaters*calc.houses},
{name:"ACF Fans",qty:calc.acf*calc.houses}
]

render()
}

function render(){
let div = document.getElementById("items")
div.innerHTML=""
items.forEach(i=>{
div.innerHTML+=`
<div class="item">
<b>${i.name}</b><br>
Qty: ${i.qty}
</div>`
})
}

</script>

</body>
</html>
