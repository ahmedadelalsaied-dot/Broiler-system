<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HATO Broiler Quotation System</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f8; color: #111; }
    header { background: #111827; color: white; padding: 24px; }
    main { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
    .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px #0001; }
    h1, h2 { margin-top: 0; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    label { font-weight: bold; font-size: 14px; }
    input, textarea, select { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    textarea { min-height: 70px; }
    button { padding: 10px 16px; border: 0; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .primary { background: #111827; color: white; }
    .green { background: #15803d; color: white; }
    .red { background: #b91c1c; color: white; }
    .blue { background: #1d4ed8; color: white; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th { background: #111827; color: white; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: center; vertical-align: top; }
    td:first-child, th:first-child { text-align: left; }
    .item { border: 1px solid #ddd; border-radius: 14px; padding: 14px; margin-bottom: 14px; background: #fafafa; }
    .totals { background: #eef2f7; padding: 16px; border-radius: 12px; font-size: 18px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <h1>HATO Broiler Quotation System</h1>
  <p>Internal automatic quotation generator</p>
</header>

<main>

  <section class="card">
    <h2>Project Data</h2>
    <div class="grid">
      <label>Client Name<input id="clientName" type="text"></label>
      <label>Number of Houses<input id="houses" type="number" value="2"></label>
      <label>Birds per House<input id="birds" type="number" value="40000"></label>
      <label>House Length (m)<input id="length" type="number" value="126"></label>
      <label>House Width (m)<input id="width" type="number" value="14"></label>
      <label>House Height (m)<input id="height" type="number" value="3"></label>
      <label>Air Speed (m/s)<input id="airSpeed" type="number" value="3"></label>
      <label>Fan Capacity (m³/h)<input id="fanCapacity" type="number" value="44000"></label>
      <label>Language
        <select id="language">
          <option value="en">English</option>
          <option value="ar">Arabic</option>
          <option value="fr">French</option>
        </select>
      </label>
    </div>
    <br>
    <button class="primary" onclick="calculate()">Calculate</button>
  </section>

  <section class="card">
    <h2>Calculation Results</h2>
    <div id="results">Click calculate.</div>
  </section>

  <section class="card">
    <div class="actions">
      <button class="green" onclick="addCalculatedItems()">Add Calculated Items</button>
      <button class="blue" onclick="addCustomItem()">Add Custom Item</button>
      <button class="primary" onclick="saveQuotation()">Save Quotation</button>
      <button class="blue" onclick="exportWord()">Export Word</button>
      <button class="red" onclick="exportPDF()">Export PDF</button>
    </div>
  </section>

  <section class="card">
    <h2>Quotation Items</h2>
    <div id="items"></div>

    <div class="totals">
      <p>Subtotal: <strong id="subtotal">0</strong> EGP</p>
      <label>Special Discount
        <input id="discount" type="number" value="0" oninput="renderItems()">
      </label>
      <p>Grand Total: <strong id="grandTotal">0</strong> EGP</p>
    </div>
  </section>

  <section class="card">
    <h2>Saved Quotations</h2>
    <div id="savedQuotes"></div>
  </section>

</main>

<script>
let calculation = {};
let items = [];
let savedQuotes = JSON.parse(localStorage.getItem("savedQuotes") || "[]");

function num(id) {
  return Number(document.getElementById(id).value) || 0;
}

function calculate() {
  const houses = num("houses");
  const length = num("length");
  const width = num("width");
  const height = num("height");
  const birds = num("birds");
  const airSpeed = num("airSpeed");
  const fanCapacity = num("fanCapacity");

  const crossSection = width * height;
  const requiredAirflow = crossSection * airSpeed * 3600;
  const fansPerHouse = Math.ceil(requiredAirflow / fanCapacity);

  const lineLength = Math.max(length - 4, 0);
  const pipesPerLine = Math.ceil(lineLength / 3);

  const feedingLinesPerHouse = Math.ceil((birds / 65) / (pipesPerLine * 4));
  const drinkingLinesPerHouse = Math.ceil((birds / 12) / (pipesPerLine * 15));

  const padArea = requiredAirflow / 3600 / 1.75;
  const coolingPadsPerHouse = Math.ceil(padArea / (1.5 * 0.6));

  calculation = {
    houses,
    crossSection,
    requiredAirflow,
    fansPerHouse,
    feedingLinesPerHouse,
    drinkingLinesPerHouse,
    padArea,
    coolingPadsPerHouse
  };

  document.getElementById("results").innerHTML = `
    <p>Cross Section Area: <strong>${crossSection.toFixed(2)} m²</strong></p>
    <p>Required Airflow: <strong>${Math.round(requiredAirflow).toLocaleString()} m³/h</strong></p>
    <p>Fans per House: <strong>${fansPerHouse}</strong></p>
    <p>Feeding Lines per House: <strong>${feedingLinesPerHouse}</strong></p>
    <p>Drinking Lines per House: <strong>${drinkingLinesPerHouse}</strong></p>
    <p>Cooling Pad Area: <strong>${padArea.toFixed(2)} m²</strong></p>
    <p>Cooling Pads per House: <strong>${coolingPadsPerHouse}</strong></p>
  `;
}

function addCalculatedItems() {
  if (!calculation.houses) calculate();

  items = [
    {
      include: true,
      name: "Automatic Feeding System",
      description: "Automatic pan feeding system for broiler house including lines, pipes, pans, suspension and operating accessories.",
      qty: calculation.feedingLinesPerHouse * calculation.houses,
      unit: "lines",
      price: 0
    },
    {
      include: true,
      name: "Automatic Drinking System",
      description: "Automatic nipple drinking system including PVC lines, nipples, regulators, end sets and suspension accessories.",
      qty: calculation.drinkingLinesPerHouse * calculation.houses,
      unit: "lines",
      price: 0
    },
    {
      include: true,
      name: "Tunnel Ventilation Fans",
      description: "Tunnel ventilation fans calculated according to house dimensions, air speed and fan capacity.",
      qty: calculation.fansPerHouse * calculation.houses,
      unit: "fans",
      price: 0
    },
    {
      include: true,
      name: "Cooling Pads",
      description: "Cooling pad panels calculated according to required airflow and pad face velocity.",
      qty: calculation.coolingPadsPerHouse * calculation.houses,
      unit: "panels",
      price: 0
    },
    {
      include: true,
      name: "Control System",
      description: "Main poultry climate control system for ventilation, cooling, heating, lighting, alarms and sensors.",
      qty: calculation.houses,
      unit: "panels",
      price: 0
    },
    {
      include: true,
      name: "Installation",
      description: "Installation of supplied equipment inside the broiler house.",
      qty: calculation.houses,
      unit: "houses",
      price: 0
    }
  ];

  renderItems();
}

function addCustomItem() {
  items.push({
    include: true,
    name: "",
    description: "",
    qty: 1,
    unit: "unit",
    price: 0
  });
  renderItems();
}

function updateItem(index, field, value) {
  if (field === "include") items[index][field] = value;
  else if (field === "qty" || field === "price") items[index][field] = Number(value) || 0;
  else items[index][field] = value;
  renderItems();
}

function removeItem(index) {
  items.splice(index, 1);
  renderItems();
}

function renderItems() {
  const container = document.getElementById("items");
  container.innerHTML = "";

  let subtotal = 0;

  items.forEach((item, index) => {
    const total = item.qty * item.price;
    if (item.include) subtotal += total;

    container.innerHTML += `
      <div class="item">
        <label>
          <input type="checkbox" ${item.include ? "checked" : ""} onchange="updateItem(${index}, 'include', this.checked)">
          Include in quotation
        </label>
        <div class="grid">
          <label>Item Name
            <input value="${item.name}" oninput="updateItem(${index}, 'name', this.value)">
          </label>
          <label>Quantity
            <input type="number" value="${item.qty}" oninput="updateItem(${index}, 'qty', this.value)">
          </label>
          <label>Unit
            <input value="${item.unit}" oninput="updateItem(${index}, 'unit', this.value)">
          </label>
          <label>Unit Price
            <input type="number" value="${item.price}" oninput="updateItem(${index}, 'price', this.value)">
          </label>
          <label>Total Price
            <input value="${total.toLocaleString()} EGP" readonly>
          </label>
        </div>
        <label>Description
          <textarea oninput="updateItem(${index}, 'description', this.value)">${item.description}</textarea>
        </label>
        <br>
        <button class="red" onclick="removeItem(${index})">Remove Item</button>
      </div>
    `;
  });

  const discount = Number(document.getElementById("discount").value) || 0;
  const grandTotal = Math.max(subtotal - discount, 0);

  document.getElementById("subtotal").innerText = subtotal.toLocaleString();
  document.getElementById("grandTotal").innerText = grandTotal.toLocaleString();
}

function buildQuoteHTML() {
  const client = document.getElementById("clientName").value || "Client";
  const lang = document.getElementById("language").value;
  const discount = Number(document.getElementById("discount").value) || 0;

  let subtotal = 0;
  let rows = "";

  items.filter(i => i.include).forEach(item => {
    const total = item.qty * item.price;
    subtotal += total;
    rows += `
      <tr>
        <td><strong>${item.name}</strong><br>${item.description}</td>
        <td>${item.qty}</td>
        <td>${item.unit}</td>
        <td>${item.price.toLocaleString()} EGP</td>
        <td>${total.toLocaleString()} EGP</td>
      </tr>
    `;
  });

  const grandTotal = Math.max(subtotal - discount, 0);

  return `
    <html>
    <head>
      <title>Quotation</title>
      <style>
        body { font-family: Arial; padding: 30px; direction: ${lang === "ar" ? "rtl" : "ltr"}; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #111827; color: white; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; vertical-align: top; }
        td:first-child, th:first-child { text-align: ${lang === "ar" ? "right" : "left"}; }
        .total { margin-top: 20px; font-size: 18px; text-align: right; }
      </style>
    </head>
    <body>
      <h1>Quotation</h1>
      <p><strong>Client:</strong> ${client}</p>
      <p><strong>Company:</strong> HATO / UTC</p>
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Qty</th>
            <th>Unit</th>
            <th>Unit Price</th>
            <th>Total Price</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="total">
        <p>Subtotal: ${subtotal.toLocaleString()} EGP</p>
        <p>Special Discount: ${discount.toLocaleString()} EGP</p>
        <h2>Grand Total: ${grandTotal.toLocaleString()} EGP</h2>
      </div>
    </body>
    </html>
  `;
}

function exportPDF() {
  const win = window.open("", "_blank");
  win.document.write(buildQuoteHTML());
  win.document.close();
  win.print();
}

function exportWord() {
  const html = buildQuoteHTML();
  const blob = new Blob([html], { type: "application/msword" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "quotation.doc";
  a.click();
}

function saveQuotation() {
  const quote = {
    id: Date.now(),
    client: document.getElementById("clientName").value || "Client",
    date: new Date().toLocaleString(),
    items,
    discount: document.getElementById("discount").value,
  };

  savedQuotes.unshift(quote);
  localStorage.setItem("savedQuotes", JSON.stringify(savedQuotes));
  renderSavedQuotes();
  alert("Quotation saved.");
}

function loadQuotation(id) {
  const quote = savedQuotes.find(q => q.id === id);
  if (!quote) return;

  document.getElementById("clientName").value = quote.client;
  document.getElementById("discount").value = quote.discount || 0;
  items = quote.items || [];
  renderItems();
}

function deleteQuotation(id) {
  savedQuotes = savedQuotes.filter(q => q.id !== id);
  localStorage.setItem("savedQuotes", JSON.stringify(savedQuotes));
  renderSavedQuotes();
}

function renderSavedQuotes() {
  const div = document.getElementById("savedQuotes");

  if (!savedQuotes.length) {
    div.innerHTML = "<p>No saved quotations yet.</p>";
    return;
  }

  div.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Client</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        ${savedQuotes.map(q => `
          <tr>
            <td>${q.client}</td>
            <td>${q.date}</td>
            <td>
              <button class="blue" onclick="loadQuotation(${q.id})">Load</button>
              <button class="red" onclick="deleteQuotation(${q.id})">Delete</button>
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

renderSavedQuotes();
</script>

</body>
</html>
